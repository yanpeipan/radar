name: Release to PyPI

on:
  release:
    types: [published]

# Prevent concurrent releases of the same tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/feedship
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tag version: $TAG_VERSION"
          echo "--- pyproject.toml first 3 lines ---"
          head -3 pyproject.toml
          echo "--- grep output ---"
          grep_output=$(grep '^version = ' pyproject.toml)
          echo "grep result: '$grep_output'"
          if [[ -z "$grep_output" ]]; then
            echo "ERROR: grep returned empty - no version line found!"
            echo "--- full file ---"
            cat pyproject.toml
            exit 1
          fi
          TOML_VERSION=$(echo "$grep_output" | sed 's/.*"//' | sed 's/"//')
          echo "pyproject.toml version: $TOML_VERSION"
          if [[ "$TOML_VERSION" != "$TAG_VERSION" ]]; then
            echo "ERROR: pyproject.toml ($TOML_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version OK"

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: rm -rf dist/ && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          retry-time-seconds: 30
