name: Release to PyPI

on:
  release:
    types: [published]

# Prevent concurrent releases of the same tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/feedship
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tag version: $TAG_VERSION"
          # Extract version from pyproject.toml using awk (more portable than complex sed)
          TOML_VERSION=$(awk -F'"' '/^version = / {print $2}' pyproject.toml)
          echo "pyproject.toml version: $TOML_VERSION"
          if [[ "$TOML_VERSION" != "$TAG_VERSION" ]]; then
            echo "ERROR: pyproject.toml ($TOML_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version OK"

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: rm -rf dist/ && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          retry-time-seconds: 30
