# LLM configuration
llm:
  timeout_seconds: 120  # Increased from 60 to handle 50-article batches under concurrent load
  model_list:
    - model_name: minimax/MiniMax-M2.7
      litellm_params:
        model: anthropic/MiniMax-M2.7
        api_key: ${OPENAI_API_KEY}
        api_base: https://api.minimaxi.com/anthropic
        rpm: 60
        max_tokens: 16384
        max_parallel_requests: 3

# Application configuration
timezone: Asia/Shanghai
bm25_factor: 0.5

# Rate limiting configuration
rate_limit:
  requests_per_minute: 10  # Per-domain default

# Tavily search provider configuration
tavily:
  api_key: ${TAVILY_API_KEY}  # Env var reference
  default_search_depth: "advanced"  # basic | advanced
  default_max_results: 10
  refresh_interval: 3600  # seconds

# Nitter RSS provider configuration for Twitter/X via Nitter instances
nitter:
  default_instance: "https://nitter.net"
  instances:
    - "https://nitter.privacydev.net"
    - "https://nitter.net"
