# LLM configuration
llm:
  provider: minimax
  model: anthropic/MiniMax-M2.7
  api_key: ${OPENAI_API_KEY}
  base_url: https://api.minimaxi.com/anthropic

# Application configuration
timezone: Asia/Shanghai
bm25_factor: 0.5

# Rate limiting configuration
rate_limit:
  requests_per_minute: 10  # Per-domain default

# Tavily search provider configuration
tavily:
  api_key: ${TAVILY_API_KEY}  # Env var reference
  default_search_depth: "advanced"  # basic | advanced
  default_max_results: 10
  refresh_interval: 3600  # seconds

# Nitter RSS provider configuration for Twitter/X via Nitter instances
nitter:
  default_instance: "https://nitter.net"
  instances:
    - "https://nitter.privacydev.net"
    - "https://nitter.net"

# WebpageProvider site configurations
# See: docs/webpage-provider.md
webpage_sites:
  jiqizhixin.com:
    _default:
      wait_selector: ".home__article-item"
      item: ".home__article-item"
      title: ".home__article-item__title"
      time: ".home__article-item__time"
      tags: ".home__article-item__tag-item"
      description: null
      link: null
      link_pattern: "https://pro.jiqizhixin.com/reference/{uuid}"
      link_uuid_regex: "/article/cover_image/([0-9a-f-]{36})/"
      date_format: CN
    articles:
      wait_selector: ".article-card"
      item: ".article-card"
      title: ".article-card__title"
      time: ".article-card__time"
      tags: ".article-card__tags > div"
      description: null
      link: null
      link_pattern: "https://pro.jiqizhixin.com/reference/{uuid}"
      link_uuid_regex: "/article/cover_image/([0-9a-f-]{36})/"
      date_format: CN
