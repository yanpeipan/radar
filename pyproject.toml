[project]
name = "radar"
version = "1.0.0"
description = "A personal information system for collecting, subscribing to, and organizing information sources from the internet"
requires-python = ">=3.10"
dependencies = [
    "feedparser>=6.0.0",
    "httpx>=0.28.0",
    "click>=8.1.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=6.0.0",
    "rich>=13.0.0",
    "PyGithub>=2.0.0",
    "dynaconf>=3.2.13",
    "trafilatura>=1.0.0",
    "robotexclusionrulesparser>=1.7.1",
    "platformdirs>=4.9.4",
    "numpy>=1.26.0,<2",
    "scikit-learn>=1.7.2",
    "pyyaml>=6.0.3",
    "uvloop>=0.22.0",  # async event loop
    "nanoid>=2.0.0",  # URL-safe ID generation
    "scrapling>=0.4.0",  # CSS-selector HTML parsing
    "msgspec>=0.20.0",  # Required by scrapling browser engine
]

[project.optional-dependencies]
test = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.0.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.0",
    "pytest-click>=1.1.0",
    "pytest-httpx>=0.36.0",
    "pytest-xdist>=3.8.0",
]
ml = [
    "sentence-transformers>=3.0.0",
    "torch>=2.0.0",
    "safetensors>=0.4.3",
    "transformers>=4.40.0",
]
cloudflare = [
    "scrapling>=0.4.0",
    "playwright>=1.49.0",
    "curl-cffi>=0.14.0",
    "socksio>=1.0.0",
    "browserforge>=1.2.0",
]

[project.scripts]
radar = "src.cli:cli"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
minversion = "9.0"
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
]
markers = [
    "asyncio: mark test as async",
    "integration: integration test requiring full app",
    "slow: tests that take significant time",
]
filterwarnings = [
    "ignore::DeprecationWarning",
]
